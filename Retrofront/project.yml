name: Retrofront

options:
  bundleIdPrefix: com.retrofront
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "18.0"

settings:
  base:
    SWIFT_VERSION: "6.1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_ALLOWED: "NO"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"

targets:

  # =========================
  # C / Rust bridge module
  # =========================
  CRetrofrontCore:
    type: library.static   # ← framework から static に変更
    platform: iOS
    sources:
      - path: frontend/CRetrofrontCore
    settings:
      base:
        CLANG_ENABLE_MODULES: YES
        HEADER_SEARCH_PATHS: "$(SRCROOT)/frontend/CRetrofrontCore"

  # =========================
  # Static Swift framework
  # Keeps RetrofrontSwift linked into the app binary so Xcode does not copy
  # Swift standard libraries into the IPA for modern iOS runtimes.
  # =========================
  RetrofrontSwift:
    type: framework
    platform: iOS
    sources:
      - path: frontend/Sources/RetrofrontSwift
    dependencies:
      - target: CRetrofrontCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.retrofront.swift
        PRODUCT_NAME: RetrofrontSwift
        DEFINES_MODULE: YES
        MACH_O_TYPE: staticlib
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO
        SKIP_INSTALL: YES
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: NO
        LIBRARY_SEARCH_PATHS: "$(SRCROOT)/target/aarch64-apple-ios/release"
        OTHER_LDFLAGS: "$(inherited) -lretrofront_core"

  # =========================
  # iOS App
  # =========================
  RetrofrontiOS:
    type: application
    platform: iOS
    sources:
      - path: apps/iOS/Sources
      - path: apps/iOS/Resources
    dependencies:
      - target: RetrofrontSwift
      - framework: ../Externals/MoltenVK/MoltenVK.xcframework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
    postBuildScripts:
      - name: Copy libretro cores
        script: |
          set -eu

          CORES_SRC="${SRCROOT}/cores"
          CORES_DST="${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Frameworks"

          sign_core() {
            if [ "${CODE_SIGNING_ALLOWED:-YES}" != "NO" ] && [ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ]; then
              codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" \
                --preserve-metadata=identifier,entitlements "$1"
            fi
          }

          mkdir -p "${CORES_DST}"

          if [ -d "${CORES_SRC}" ]; then
            find "${CORES_SRC}" -maxdepth 1 -type f -name '*.dylib' | while read -r core; do
              destination="${CORES_DST}/$(basename "${core}")"
              cp -f "${core}" "${destination}"
              sign_core "${destination}"
            done

            find "${CORES_SRC}" -maxdepth 1 -type d -name '*.framework' | while read -r core; do
              destination="${CORES_DST}/$(basename "${core}")"
              rm -rf "${destination}"
              ditto "${core}" "${destination}"
              sign_core "${destination}"
            done
          fi

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.retrofront.app
        PRODUCT_NAME: Retrofront
        INFOPLIST_FILE: apps/iOS/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/cores $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Frameworks"
        LIBRARY_SEARCH_PATHS: "$(inherited) $(SRCROOT)/target/aarch64-apple-ios/release"
        OTHER_LDFLAGS: "$(inherited) -lretrofront_core"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @loader_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: NO

schemes:
  RetrofrontiOS:
    build:
      targets:
        RetrofrontiOS: all
        RetrofrontSwift: all
