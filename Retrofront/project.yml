name: Retrofront
options:
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: dev.retrofront.app
    DEVELOPMENT_TEAM: ""
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    SWIFT_VERSION: "5.9"
targets:
  RetrofrontiOS:
    type: application
    platform: iOS
    sources:
      - path: platforms/ios/Sources
    resources:
      - path: Resources/assets.zip
    dependencies:
      - sdk: Metal.framework
      - sdk: QuartzCore.framework
      - framework: lib/ios/libretrofront_core.a
        embed: false
    settings:
      base:
        INFOPLIST_FILE: platforms/ios/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: platforms/ios/Sources/RetrofrontBridge.h
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: iphoneos
        ONLY_ACTIVE_ARCH: NO
        VALID_ARCHS: arm64
    postCompileScripts:
      - name: Bundle libretro cores
        script: |
          set -euo pipefail
          mkdir -p "$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH"
          if [ -d "$SRCROOT/cores" ]; then
            for core in "$SRCROOT"/cores/*.dylib "$SRCROOT"/cores/*.framework; do
              [ -e "$core" ] || continue
              cp -R "$core" "$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH/"
            done
          fi
