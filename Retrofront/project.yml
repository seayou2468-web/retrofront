name: Retrofront
options:
  bundleIdPrefix: com.retrofront
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_ALLOWED: "NO"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  RetrofrontCoreBridge:
    type: framework
    platform: iOS
    sources:
      - path: apps/frontend/Sources/RetrofrontSwift
      - path: apps/frontend/CRetrofrontCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.retrofront.corebridge
        DEFINES_MODULE: "YES"
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/apps/frontend/CRetrofrontCore"
        HEADER_SEARCH_PATHS: "$(SRCROOT)/apps/frontend/CRetrofrontCore"
        LIBRARY_SEARCH_PATHS: "$(SRCROOT)/target/aarch64-apple-ios/release"
        OTHER_LDFLAGS: "$(inherited) -lretrofront_core"
        DEAD_CODE_STRIPPING: "YES"
        STRIP_INSTALLED_PRODUCT: "YES"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "NO"

    dependencies:
      - framework: target/aarch64-apple-ios/release/libretrofront_core.dylib
        embed: false

  RetrofrontiOS:
    type: application
    platform: iOS
    sources:
      - path: flutter/ios/Runner
        optional: true
      - path: apps/iOS/Resources

    dependencies:
      - target: RetrofrontCoreBridge

      # =========================
      # UIKit / Core frameworks
      # =========================
      - sdk: UIKit.framework
      - sdk: Foundation.framework
      - sdk: CoreFoundation.framework
      - sdk: CoreGraphics.framework
      - sdk: CoreText.framework
      - sdk: QuartzCore.framework
      - sdk: AudioToolbox.framework
      - sdk: AVFoundation.framework
      - sdk: GameController.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework

      # =========================
      # 追加: OpenGL / Legacy Graphics
      # =========================
      - sdk: OpenGLES.framework
      - sdk: GLKit.framework

      # =========================
      # 追加: Vulkan backend
      # =========================
      - framework: ../Externals/MoltenVK/MoltenVK.xcframework

    preBuildScripts:
      - name: Build shared Flutter UI
        script: |
          set -eu
          if command -v flutter >/dev/null 2>&1; then
            cd "${SRCROOT}/flutter"
            flutter pub get
            flutter build ios --config-only --no-codesign
          else
            echo "warning: flutter not found; run 'flutter create --platforms=ios .' in Retrofront/flutter before archiving"
          fi

    postBuildScripts:
      - name: Copy libretro cores
        script: |
          set -eu
          CORES_SRC="${SRCROOT}/archifacts/ios"
          CORES_DST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/dylibs"

          sign_core() {
            if [ "${CODE_SIGNING_ALLOWED:-YES}" != "NO" ] && [ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ]; then
              codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" --preserve-metadata=identifier,entitlements "$1"
            fi
          }

          mkdir -p "${CORES_DST}"
          if [ -f "${SRCROOT}/target/aarch64-apple-ios/release/libretrofront_core.dylib" ]; then
            cp -f "${SRCROOT}/target/aarch64-apple-ios/release/libretrofront_core.dylib" "${CORES_DST}/"
            sign_core "${CORES_DST}/libretrofront_core.dylib"
          fi

          if [ -d "${CORES_SRC}" ]; then
            find "${CORES_SRC}" -maxdepth 1 -type f -name '*.dylib' -print | while IFS= read -r core; do
              core_name="$(basename "${core}")"
              case "${core_name}" in
                *_libretro*.dylib|*.libretro.dylib) ;;
                *)
                  echo "Skipping non-libretro dylib ${core_name}"
                  continue
                  ;;
              esac
              destination="${CORES_DST}/${core_name}"
              cp -f "${core}" "${destination}"
              sign_core "${destination}"
            done
          fi

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.retrofront.app
        PRODUCT_NAME: Retrofront
        INFOPLIST_FILE: apps/iOS/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/cores $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Frameworks"
        LIBRARY_SEARCH_PATHS: "$(inherited) $(SRCROOT)/target/aarch64-apple-ios/release"
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/apps/frontend/CRetrofrontCore"
        HEADER_SEARCH_PATHS: "$(SRCROOT)/apps/frontend/CRetrofrontCore"
        OTHER_LDFLAGS: "$(inherited) -lc++ -ObjC"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @loader_path/Frameworks"
        DEAD_CODE_STRIPPING: "YES"
        STRIP_INSTALLED_PRODUCT: "YES"
        STRIP_STYLE: "all"
        COPY_PHASE_STRIP: "YES"
        DEBUG_INFORMATION_FORMAT: "dwarf"
        GCC_SYMBOLS_PRIVATE_EXTERN: "YES"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "NO"

schemes:
  RetrofrontiOS:
    build:
      targets:
        RetrofrontiOS: all
