name: Retrofront

options:
  bundleIdPrefix: com.retrofront
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "18.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_ALLOWED: "NO"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"

targets:

  # =========================
  # C CORE MODULE
  # =========================
  CRetrofrontCore:
  type: library.static
  platform: iOS

  sources:
    - path: frontend/CRetrofrontCore

  settings:
    base:
      DEFINES_MODULE: YES
      MODULEMAP_FILE: $(SRCROOT)/frontend/CRetrofrontCore/module.modulemap
      PUBLIC_HEADERS_FOLDER_PATH: include

  # =========================
  # SWIFT FRAMEWORK
  # =========================
  RetrofrontSwift:
    type: framework
    platform: iOS
    sources:
      - path: frontend/Sources/RetrofrontSwift

    dependencies:
      - target: CRetrofrontCore
      - framework: target/aarch64-apple-ios/release/libretrofront_core.a
        embed: false

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.retrofront.swift
        DEFINES_MODULE: "YES"
        LIBRARY_SEARCH_PATHS: "$(SRCROOT)/target/aarch64-apple-ios/release"
        OTHER_LDFLAGS: "$(inherited) -lretrofront_core"

  # =========================
  # iOS APP
  # =========================
  RetrofrontiOS:
    type: application
    platform: iOS
    sources:
      - path: apps/iOS/Sources
      - path: apps/iOS/Resources

    dependencies:
      - target: RetrofrontSwift
      - framework: ../Externals/MoltenVK/MoltenVK.xcframework
      - sdk: Metal.framework
      - sdk: MetalKit.framework

    postBuildScripts:
      - name: Copy libretro cores
        script: |
          set -eu

          CORES_SRC="${SRCROOT}/cores"
          CORES_DST="${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Frameworks"

          sign_core() {
            if [ "${CODE_SIGNING_ALLOWED:-YES}" != "NO" ] && [ -n "${EXPANDED_APP_IDENTITY:-}" ]; then
              codesign --force --sign "${EXPANDED_APP_IDENTITY}" --preserve-metadata=identifier,entitlements "$1"
            fi
          }

          mkdir -p "${CORES_DST}"

          if [ -d "${CORES_SRC}" ]; then
            find "${CORES_SRC}" -maxdepth 1 -type f -name '*.dylib' | while read -r core; do
              cp -f "$core" "${CORES_DST}/$(basename "$core")"
              sign_core "${CORES_DST}/$(basename "$core")"
            done

            find "${CORES_SRC}" -maxdepth 1 -type d -name '*.framework' | while read -r core; do
              rm -rf "${CORES_DST}/$(basename "$core")"
              ditto "$core" "${CORES_DST}/$(basename "$core")"
              sign_core "${CORES_DST}/$(basename "$core")"
            done
          fi

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.retrofront.app
        PRODUCT_NAME: Retrofront
        INFOPLIST_FILE: apps/iOS/Resources/Info.plist
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/cores $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Frameworks"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @loader_path/Frameworks"

schemes:
  RetrofrontiOS:
    build:
      targets:
        RetrofrontiOS: all
        RetrofrontSwift: all
        CRetrofrontCore: all
