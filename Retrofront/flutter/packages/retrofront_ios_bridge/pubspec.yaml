name: retrofront_ios_bridge
version: 0.1.0
publish_to: none
description: Objective-C iOS platform bridge for Retrofront document picking.

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: RetrofrontIosBridgePlugin
