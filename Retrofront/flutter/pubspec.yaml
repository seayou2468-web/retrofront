name: retrofront
version: 0.2.0+2
description: Flutter libretro frontend UI for iOS and Linux.
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  archive: ^3.6.1
  ffi: ^2.1.3
  path: ^1.9.0
  retrofront_ios_bridge:
    path: packages/retrofront_ios_bridge

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/retroarch/
