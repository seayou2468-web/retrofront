name: retrofront
version: 0.2.0+2
description: Flutter libretro frontend UI for iOS and Linux.
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3
  file_picker: ^8.1.7
  path: ^1.9.0
  path_provider: ^2.1.5
  window_manager: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/retroarch/
