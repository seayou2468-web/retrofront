name: Retrofront

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    name: Linux Swift/Rust UI
    runs-on: ubuntu-latest

    container:
      image: swift:6.0-jammy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native dependencies
        shell: bash
        run: |
          apt-get update

          apt-get install -y \
            clang \
            libclang-dev \
            make \
            curl

      - name: Install Rust
        shell: bash
        run: |
          curl --proto '=https' \
            --tlsv1.2 \
            -sSf \
            https://sh.rustup.rs \
            | sh -s -- -y

          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Test Linux workspace
        working-directory: Retrofront
        shell: bash
        run: |
          . "$HOME/.cargo/env"

          make test

      - name: Build Linux UI
        working-directory: Retrofront
        shell: bash
        run: |
          . "$HOME/.cargo/env"

          make linux-ui

      - name: Locate executable
        working-directory: Retrofront
        shell: bash
        run: |
          find .build -type f -executable

      - name: Package Linux build
        working-directory: Retrofront
        shell: bash
        run: |
          APP=$(find .build/release -type f -executable | head -n 1)

          if [ -z "$APP" ]; then
            echo "No executable found"
            exit 1
          fi

          echo "Found executable:"
          echo "$APP"

          rm -rf dist
          mkdir -p dist

          cp "$APP" dist/Retrofront

          chmod +x dist/Retrofront

          tar -czf retrofront-linux.tar.gz dist

          ls -lah retrofront-linux.tar.gz

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Retrofront-Linux
          path: Retrofront/retrofront-linux.tar.gz
          if-no-files-found: error

  ios-device:
    name: iOS Device Build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        shell: bash
        run: |
          brew install xcodegen

      - name: Build Rust static library for iOS device
        working-directory: Retrofront
        shell: bash
        run: |
          make ios-rust

      - name: Generate Xcode project
        working-directory: Retrofront
        shell: bash
        run: |
          make xcodegen

      - name: Verify bundled libretro core exists
        working-directory: Retrofront
        shell: bash
        run: |
          test -f cores/mgba_libretro_ios.dylib

      - name: Build app for generic iOS device
        working-directory: Retrofront
        shell: bash
        run: |
          xcodebuild \
            -project Retrofront.xcodeproj \
            -scheme RetrofrontiOS \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath DerivedData \
            build

      - name: Create IPA
        working-directory: Retrofront
        shell: bash
        run: |
          APP_PATH=$(
            find DerivedData/Build/Products \
              -type d \
              -name "*.app" \
              | head -n 1
          )

          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi

          echo "Found app:"
          echo "$APP_PATH"

          rm -rf Payload
          rm -f Retrofront.ipa

          mkdir -p Payload

          cp -R "$APP_PATH" Payload/

          echo "Payload contents:"
          find Payload

          zip -r Retrofront.ipa Payload

          echo "IPA contents:"
          unzip -l Retrofront.ipa

          test -f Payload/Retrofront.app/Frameworks/mgba_libretro_ios.dylib

          ls -lah Retrofront.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Retrofront-IPA
          path: Retrofront/Retrofront.ipa
          if-no-files-found: error

      - name: Upload APP artifact
        uses: actions/upload-artifact@v4
        with:
          name: Retrofront-APP
          path: Retrofront/Payload/*.app
          if-no-files-found: warn
