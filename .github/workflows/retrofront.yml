name: Retrofront

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: retrofront-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FLUTTER_VERSION: "3.27.1"

jobs:
  linux:
    name: Linux Flutter/Rust frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install native dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            curl \
            file \
            libgtk-3-dev \
            liblzma-dev \
            ninja-build \
            pkg-config \
            desktop-file-utils

      - name: Install Rust
        shell: bash
        run: |
          curl --proto '=https' \
            --tlsv1.2 \
            -sSf \
            https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache Cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Retrofront/target
          key: linux-cargo-${{ runner.os }}-${{ hashFiles('Retrofront/Cargo.lock') }}
          restore-keys: |
            linux-cargo-${{ runner.os }}-

      - name: Fetch bundled RetroArch assets
        working-directory: Retrofront
        shell: bash
        run: ../scripts/fetch-frontend-assets.sh flutter/assets/retroarch

      - name: Test Rust core
        working-directory: Retrofront
        shell: bash
        run: |
          . "$HOME/.cargo/env"
          cargo test --manifest-path Cargo.toml -p retrofront-core

      - name: Test Flutter UI
        working-directory: Retrofront/flutter
        shell: bash
        run: |
          flutter pub get
          flutter test

      - name: Build Linux Flutter UI
        working-directory: Retrofront
        shell: bash
        run: |
          . "$HOME/.cargo/env"
          make flutter-linux

      - name: Download appimagetool
        working-directory: Retrofront
        shell: bash
        run: |
          curl --fail --location --output appimagetool-x86_64.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        working-directory: Retrofront
        shell: bash
        run: |
          . "$HOME/.cargo/env"
          APPIMAGETOOL="$PWD/appimagetool-x86_64.AppImage" make linux-appimage
          file dist/Retrofront-x86_64.AppImage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v5
        with:
          name: Retrofront-Linux-AppImage
          path: Retrofront/dist/Retrofront-x86_64.AppImage
          if-no-files-found: error
          compression-level: 0

  ios-device:
    name: iOS Flutter Device Build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install XcodeGen
        shell: bash
        run: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Cache Cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Retrofront/target
          key: ios-cargo-${{ runner.os }}-${{ hashFiles('Retrofront/Cargo.lock') }}
          restore-keys: |
            ios-cargo-${{ runner.os }}-

      - name: Fetch bundled RetroArch assets
        working-directory: Retrofront
        shell: bash
        run: ../scripts/fetch-frontend-assets.sh flutter/assets/retroarch

      - name: Install Rust iOS target
        shell: bash
        run: rustup target add aarch64-apple-ios

      - name: Build Rust FFI core for iOS device
        working-directory: Retrofront
        shell: bash
        run: make ios-rust

      - name: Prepare Flutter iOS project files
        working-directory: Retrofront/flutter
        shell: bash
        run: |
          if [ ! -d ios ]; then
            flutter create --platforms=ios .
          fi
          flutter pub get

      - name: Generate Xcode project
        working-directory: Retrofront
        shell: bash
        run: make xcodegen

      - name: Verify bundled libretro core exists
        working-directory: Retrofront
        shell: bash
        run: test -f archifacts/ios/mgba_libretro_ios.dylib

      - name: Build Flutter app for generic iOS device
        working-directory: Retrofront/flutter
        shell: bash
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        working-directory: Retrofront/flutter
        shell: bash
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          test -d "$APP_PATH"
          rm -rf Payload Retrofront.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/Retrofront.app
          mkdir -p Payload/Retrofront.app/Frameworks
          cp ../archifacts/ios/*.dylib Payload/Retrofront.app/Frameworks/ 2>/dev/null || true
          zip -r Retrofront.ipa Payload
          unzip -l Retrofront.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v5
        with:
          name: Retrofront-IPA
          path: Retrofront/flutter/Retrofront.ipa
          if-no-files-found: error
          compression-level: 0

      - name: Upload APP artifact
        uses: actions/upload-artifact@v5
        with:
          name: Retrofront-APP
          path: Retrofront/flutter/Payload/*.app
          if-no-files-found: warn
