name: Retrofront

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: retrofront-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  linux:
    name: Linux Swift/Rust UI
    runs-on: ubuntu-latest

    container:
      image: swift:6.0-jammy

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install native dependencies
        shell: bash
        run: |
          apt-get update

          apt-get install -y \
            clang \
            libclang-dev \
            make \
            curl \
            file \
            desktop-file-utils \
            pkg-config \
            libfontconfig1-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev

      - name: Install Rust
        shell: bash
        run: |
          curl --proto '=https' \
            --tlsv1.2 \
            -sSf \
            https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable

          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache Cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Retrofront/target
          key: linux-cargo-${{ runner.os }}-${{ hashFiles('Retrofront/Cargo.lock') }}
          restore-keys: |
            linux-cargo-${{ runner.os }}-

      - name: Fetch bundled frontend assets
        working-directory: Retrofront
        shell: bash
        run: ../scripts/fetch-frontend-assets.sh apps/iOS/Resources

      - name: Test Linux workspace
        working-directory: Retrofront
        shell: bash
        run: |
          . "$HOME/.cargo/env"

          make test

      - name: Build Linux UI
        working-directory: Retrofront
        shell: bash
        run: |
          . "$HOME/.cargo/env"

          make linux-ui

      - name: Download appimagetool
        working-directory: Retrofront
        shell: bash
        run: |
          curl --fail --location --output appimagetool-x86_64.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        working-directory: Retrofront
        shell: bash
        run: |
          . "$HOME/.cargo/env"

          APPIMAGETOOL="$PWD/appimagetool-x86_64.AppImage" make linux-appimage
          file dist/Retrofront-x86_64.AppImage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v5
        with:
          name: Retrofront-Linux-AppImage
          path: Retrofront/dist/Retrofront-x86_64.AppImage
          if-no-files-found: error
          compression-level: 0

  ios-device:
    name: iOS Device Build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install XcodeGen
        shell: bash
        run: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Cache Cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Retrofront/target
          key: ios-cargo-${{ runner.os }}-${{ hashFiles('Retrofront/Cargo.lock') }}
          restore-keys: |
            ios-cargo-${{ runner.os }}-

      - name: Fetch bundled frontend assets
        working-directory: Retrofront
        shell: bash
        run: ../scripts/fetch-frontend-assets.sh apps/iOS/Resources

      - name: Install Rust iOS target
        shell: bash
        run: rustup target add aarch64-apple-ios

      - name: Build Rust static library for iOS device
        working-directory: Retrofront
        shell: bash
        env:
          IOS_RUST_FEATURES: ios
        run: |
          make ios-rust

      - name: Generate Xcode project
        working-directory: Retrofront
        shell: bash
        run: |
          make xcodegen

      - name: Verify bundled libretro core exists
        working-directory: Retrofront
        shell: bash
        run: |
          test -f archifacts/ios/mgba_libretro_ios.dylib

      - name: Build app for generic iOS device
        working-directory: Retrofront
        shell: bash
        run: |
          xcodebuild \
            -project Retrofront.xcodeproj \
            -scheme RetrofrontiOS \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath DerivedData \
            build

      - name: Create IPA
        working-directory: Retrofront
        shell: bash
        run: |
          APP_PATH=$(
            find DerivedData/Build/Products \
              -type d \
              -name "*.app" \
              | head -n 1
          )

          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi

          echo "Found app:"
          echo "$APP_PATH"

          rm -rf Payload
          rm -f Retrofront.ipa

          mkdir -p Payload

          cp -R "$APP_PATH" Payload/

          echo "Payload contents:"
          find Payload

          zip -r Retrofront.ipa Payload

          echo "IPA contents:"
          unzip -l Retrofront.ipa

          test -f Payload/Retrofront.app/Frameworks/mgba_libretro_ios.dylib

          ls -lah Retrofront.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v5
        with:
          name: Retrofront-IPA
          path: Retrofront/Retrofront.ipa
          if-no-files-found: error
          compression-level: 0

      - name: Upload APP artifact
        uses: actions/upload-artifact@v5
        with:
          name: Retrofront-APP
          path: Retrofront/Payload/*.app
          if-no-files-found: warn
