name: Retrofront

on:
  push:
    branches:
      - main
      - work
  pull_request:

jobs:
  linux:
    name: Linux Swift/Rust UI
    runs-on: ubuntu-latest
    container: swift:6.0-jammy

    steps:
      - uses: actions/checkout@v4

      - name: Install native dependencies
        run: apt-get update && apt-get install -y clang libclang-dev make

      - name: Test Linux workspace
        working-directory: Retrofront
        run: make test

      - name: Build Linux UI
        working-directory: Retrofront
        run: make linux-ui

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: retrofront-linux-ui
          path: |
            Retrofront/.build
            Retrofront/build
          if-no-files-found: warn

  ios-device:
    name: iOS device build
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build Rust static library for iOS device
        working-directory: Retrofront
        run: make ios-rust

      - name: Generate Xcode project
        working-directory: Retrofront
        run: make xcodegen

      - name: Verify bundled libretro core exists
        working-directory: Retrofront
        run: test -f dylibs/mgba_libretro_ios.dylib

      - name: Build app for generic iOS device
        working-directory: Retrofront
        run: |
          xcodebuild \
            -project Retrofront.xcodeproj \
            -scheme RetrofrontiOS \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath DerivedData \
            build

      - name: Create IPA
        working-directory: Retrofront
        run: |
          APP_PATH=$(find DerivedData/Build/Products -type d -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi

          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

          cd Payload
          zip -r ../Retrofront.ipa .
          cd ..

          test -f Payload/Retrofront.app/Frameworks/mgba_libretro_ios.dylib
          ls -lah Retrofront.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Retrofront-IPA
          path: Retrofront/Retrofront.ipa
          if-no-files-found: error

      - name: Upload APP artifact
        uses: actions/upload-artifact@v4
        with:
          name: Retrofront-APP
          path: Retrofront/Payload/*.app
          if-no-files-found: warn
