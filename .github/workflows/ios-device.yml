name: iOS device build

on:
  push:
    branches: [ main, develop ]
  pull_request:
  workflow_dispatch:

jobs:
  archive-device:
    name: Archive for physical iOS devices
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Archive generic iOS device build
        run: |
          xcodebuild archive \
            -project RetroFront.xcodeproj \
            -scheme RetroFrontiOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/RetroFrontiOS.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
      - name: Upload xcarchive
        uses: actions/upload-artifact@v4
        with:
          name: RetroFrontiOS-xcarchive
          path: build/RetroFrontiOS.xcarchive

  physical-device-tests:
    name: Run tests on attached physical iOS device
    runs-on: [self-hosted, macOS, iOS-device]
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Test on real iOS device only
        env:
          IOS_DEVICE_ID: ${{ secrets.IOS_DEVICE_ID }}
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: |
          test -n "$IOS_DEVICE_ID"
          xcodebuild test \
            -project RetroFront.xcodeproj \
            -scheme RetroFrontiOS \
            -configuration Debug \
            -destination "platform=iOS,id=$IOS_DEVICE_ID" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Automatic
