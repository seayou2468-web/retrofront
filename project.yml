name: RetroFront
options:
  bundleIdPrefix: com.retrofront
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
packages: {}
targets:
  CLibretroHost:
    type: library.static
    platform: iOS
    sources:
      - path: Sources/CLibretroHost
      - path: Externals/libretro-common/include
        buildPhase: none
    settings:
      HEADER_SEARCH_PATHS:
        - Sources/CLibretroHost/include
        - Externals/libretro-common/include
  RetroFrontCore:
    type: framework
    platform: iOS
    sources:
      - Sources/RetroFrontCore
    dependencies:
      - target: CLibretroHost
  RetroFrontiOS:
    type: application
    platform: iOS
    sources:
      - Sources/RetroFrontiOS
    dependencies:
      - target: RetroFrontCore
      - target: CLibretroHost
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: RetroFront
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
    settings:
      CODE_SIGN_STYLE: Automatic
schemes:
  RetroFrontiOS:
    build:
      targets:
        RetroFrontiOS: all
    run:
      config: Debug
    test:
      config: Debug
